name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          # name        = display label
          # install     = editable installs (shared first), space-separated paths
          # path        = directory to lint + test
          - { name: mcp_sports, install: "packages/shared_py apps/mcp_sports[dev]", path: apps/mcp_sports }
          - { name: rag_py,     install: "packages/shared_py packages/rag_py[dev]", path: packages/rag_py }
          - { name: db_py,      install: "packages/shared_py packages/db_py[dev]",  path: packages/db_py }
          - { name: api,        install: "packages/shared_py packages/rag_py packages/db_py apps/api[dev]", path: apps/api }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install component (editable, shared first)
        run: |
          python -m pip install --upgrade pip
          for pkg in ${{ matrix.component.install }}; do
            pip install -e "$pkg"
          done
      - name: Ruff
        run: ruff check ${{ matrix.component.path }}
      - name: Pytest
        run: pytest -q ${{ matrix.component.path }}/tests

  web-unit:
    name: web (unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build   # tsc --noEmit && vite build
      - run: npm run test    # vitest run

  web-e2e:
    name: web (e2e — Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        # Real Playwright navigation suite is wired in PR 7 (feat/ui-e2e-playwright).
        run: echo "web-e2e placeholder — implemented in PR 7"
