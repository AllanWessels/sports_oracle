[project]
name = "sports-oracle-rag"
version = "0.1.0"
description = "Reusable RAG library for Sports Oracle: embeddings, Qdrant vector store, chunking."
requires-python = ">=3.11"
dependencies = [
    "qdrant-client>=1.12,<2",
    "fastembed>=0.4,<0.5",
    "pydantic>=2.9,<3",
    "pydantic-settings>=2.3,<3",
    "sports-oracle-shared>=0.1.0",
]

[project.optional-dependencies]
gpu = ["fastembed-gpu>=0.4,<0.5"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "anyio[trio]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["sports_oracle_rag"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
