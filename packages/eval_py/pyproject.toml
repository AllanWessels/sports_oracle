[project]
name = "sports-oracle-eval"
version = "0.1.0"
description = "Evaluation library for Sports Oracle: RAGAS metrics, citation-contract checks, routing aggregates."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.9,<3",
    "sports-oracle-shared>=0.1.0",
]

[project.optional-dependencies]
# Heavy judge/embedding stack — only needed to actually run RAGAS (make eval,
# the async judge worker). Kept out of base deps so unit tests + CI stay light.
ragas = [
    "ragas>=0.2,<0.3",
    "datasets>=2.0",
    "langchain-anthropic>=0.3,<0.4",
    "sports-oracle-rag>=0.1.0",
]
dev = [
    "pytest>=8,<9",
    "pytest-asyncio>=0.24,<0.25",
    "ruff",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sports_oracle_eval"]

[tool.hatch.build.targets.wheel.force-include]
"sports_oracle_eval/datasets/golden.jsonl" = "sports_oracle_eval/datasets/golden.jsonl"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
