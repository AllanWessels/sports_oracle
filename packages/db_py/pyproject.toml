[project]
name = "sports-oracle-db"
version = "0.1.0"
description = "Async Postgres persistence library for Sports Oracle."
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0,<3",
    "asyncpg>=0.30,<0.31",
    "alembic>=1.13,<2",
    "pydantic>=2.9,<3",
    "sports-oracle-shared>=0.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "aiosqlite>=0.20",
    "ruff>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["sports_oracle_db"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
