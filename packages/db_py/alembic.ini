# Alembic configuration for sports-oracle-db
# The script_location path is relative to where `alembic` is invoked.
# Run migrations from the packages/db_py/ directory.

[alembic]
script_location = sports_oracle_db/migrations

# The sqlalchemy.url placeholder is overridden in env.py via DATABASE_URL.
# Set this to a sync URL if you want alembic CLI to use it directly,
# otherwise leave blank and rely on env.py.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
