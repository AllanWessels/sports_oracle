# Sports Oracle — production-shaped local stack.
# `docker compose up` builds and runs the whole system.
# Local dev overrides (hot reload, bind mounts) live in docker-compose.override.yml.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sports_oracle}
      POSTGRES_USER: ${POSTGRES_USER:-oracle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oracle}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oracle}"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  mcp-sports:
    build:
      context: .
      dockerfile: apps/mcp_sports/Dockerfile
    env_file: .env
    expose:
      - "8765"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mcp-sports:
        condition: service_started

  ingest-worker:
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
    env_file: .env
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    # Port publishing is provided by docker-compose.override.yml for local dev
    # (Vite on 5173). For a production-only run, add `-p 5173:80` or your own overlay.
    depends_on:
      - api

volumes:
  pgdata:
  qdrant_storage:
